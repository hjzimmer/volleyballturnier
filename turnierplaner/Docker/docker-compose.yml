version: '3.8'
services:
  turnierplaner:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
      network: host
    container_name: turnierplaner
    ports:
      - "8000:80"
#    volumes:
#      - ..:/var/www/html/Turnierplaner
    restart: unless-stopped
    environment:
      - TZ=Europe/Berlin
      - DOCKER_BUILDKIT=0
